[build]
  command = "npm install && cd frontend && npm install && npm run build"
  publish = "frontend/.next"

[build.environment]
  NODE_VERSION = "18"
  NEXT_TELEMETRY_DISABLED = "1"

# Forza il plugin Next.js per il riconoscimento del framework.
# Le API route sotto frontend/src/app/api/** vengono servite direttamente da questo plugin,
# come funzioni Netlify colocate con l'app — non serve più una cartella netlify/functions separata.
[[plugins]]
  package = "@netlify/plugin-nextjs"

# Headers per sicurezza e performance
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
